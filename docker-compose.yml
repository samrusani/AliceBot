services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: alicebot-postgres
    environment:
      POSTGRES_USER: alicebot_admin
      POSTGRES_PASSWORD: alicebot_admin
      POSTGRES_DB: alicebot
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: alicebot-redis
    ports:
      - "127.0.0.1:6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: alicebot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: alicebot
      MINIO_ROOT_PASSWORD: alicebot-secret
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
